<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">RECUERDO@S - portada temporal</title>
  <desc id="desc">Portada temporal estilo punk zine para el lanzamiento RECUERDO@S de La Dosis.</desc>
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.32"/>
      </feComponentTransfer>
    </filter>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="4" seed="12"/>
      <feDisplacementMap in="SourceGraphic" scale="5"/>
    </filter>
  </defs>
  <rect width="900" height="900" fill="#070707"/>
  <rect x="46" y="48" width="810" height="804" fill="#111" stroke="#eee9df" stroke-width="18" transform="rotate(-1 450 450)"/>
  <rect x="76" y="76" width="750" height="748" fill="#070707" stroke="#e73233" stroke-width="8" opacity=".82" transform="rotate(1.2 450 450)"/>
  <g opacity=".42" filter="url(#rough)">
    <rect width="900" height="900" fill="#eee9df"/>
  </g>
  <g filter="url(#ink)">
    <path d="M166 256c126-42 254-44 384-5 49 15 100 27 153 22" fill="none" stroke="#e73233" stroke-width="24" stroke-linecap="square"/>
    <path d="M178 638c130 32 265 36 405 8 65-13 118-13 159 0" fill="none" stroke="#eee9df" stroke-width="16" stroke-linecap="square"/>
    <text x="450" y="405" fill="#eee9df" font-family="Impact, Arial Black, sans-serif" font-size="118" text-anchor="middle" letter-spacing="2">RECUERDO@S</text>
    <text x="450" y="500" fill="#e73233" font-family="Impact, Arial Black, sans-serif" font-size="86" text-anchor="middle" letter-spacing="4">LA DOSIS</text>
    <text x="450" y="586" fill="#eee9df" font-family="Arial, sans-serif" font-size="35" text-anchor="middle" letter-spacing="5">1 ABRIL 2026</text>
  </g>
  <path d="M110 705l150-26 9 55-150 22z" fill="#d8d0c2" opacity=".72" transform="rotate(-9 190 718)"/>
  <path d="M642 126l154 21-9 60-154-26z" fill="#d8d0c2" opacity=".68" transform="rotate(8 718 166)"/>
</svg>
